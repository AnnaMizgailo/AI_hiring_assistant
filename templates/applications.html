{% extends "base.html" %}

{% block content %}
<h1>Отклики на вакансию</h1>
<div class="filter">
    <label>Статус:</label>
    <select id="statusFilter">
        <option value="">Все</option>
        <option value="NEW">NEW</option>
        <option value="PROFILE_READY">PROFILE_READY</option>
        <option value="SCORING_DONE">SCORING_DONE</option>
        <option value="SCHEDULED">SCHEDULED</option>
        <option value="REJECTED">REJECTED</option>
    </select>

    <label>Мин. балл:</label>
    <input type="number" id="minScore" min="0" max="100" placeholder="0">
    <label>Макс. балл:</label>
    <input type="number" id="maxScore" min="0" max="100" placeholder="100">

    <button onclick="loadApplications()" class="btn">Применить</button>
</div>

<table id="appsTable">
    <thead>
        <tr>
            <th>Кандидат</th>
            <th>Статус</th>
            <th>Балл</th>
            <th>Сводка</th>
            <th>Дата отклика</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
async function loadApplications() {
    const jobId = '{{ job_id }}';
    const status = document.getElementById('statusFilter').value;
    const minScore = document.getElementById('minScore').value;
    const maxScore = document.getElementById('maxScore').value;

    let url = `/api/jobs/${jobId}/applications?`;
    if (status) url += `status=${status}&`;
    if (minScore) url += `min_score=${minScore}&`;
    if (maxScore) url += `max_score=${maxScore}&`;

    const response = await apiFetch(url);
    const apps = await response.json();
    const tbody = document.querySelector('#appsTable tbody');
    tbody.innerHTML = '';
    apps.forEach(app => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${app.candidate_name || 'Не указано'}</td>
            <td>${app.status}</td>
            <td>${app.score !== null ? app.score : '—'}</td>
            <td>${app.screening_summary || ''}</td>
            <td>${new Date(app.created_at).toLocaleString()}</td>
        `;
        tbody.appendChild(tr);
    });
}

loadApplications();
</script>
{% endblock %}
