{% extends "base.html" %}

{% block content %}
<h1>{{ "Редактирование вакансии" if job else "Новая вакансия" }}</h1>

{% if job %}
    <input type="hidden" id="job-id" value="{{ job.id }}">
{% endif %}

<form id="jobForm">
    <div>
        <label>Название:</label>
        <input type="text" id="title" value="{{ job.title if job else '' }}" required>
    </div>
    <div>
        <label>Описание:</label>
        <textarea id="description" required>{{ job.description if job else '' }}</textarea>
    </div>
    <div>
        <label>Пороговый балл (0-100):</label>
        <input type="number" id="threshold_score" min="0" max="100" value="{{ job.threshold_score if job else 70 }}" required>
    </div>
    <div>
        <label>Ключевые требования (по одному на строке):</label>
        <textarea id="requirements_lines" placeholder="Python&#10;FastAPI&#10;SQL&#10;Docker">{% if job and job.requirements_json and job.requirements_json.must_have %}{{ job.requirements_json.must_have | join('\n') }}{% endif %}</textarea>
    </div>
    <button type="submit" class="btn btn-lg"><i class="fas fa-save"></i> Сохранить</button>
</form>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('jobForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const requirementsLines = document.getElementById('requirements_lines').value
            .split('\n')
            .map(x => x.trim())
            .filter(Boolean);

        const data = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            threshold_score: parseInt(document.getElementById('threshold_score').value),
            requirements_json: { must_have: requirementsLines }
        };

        let url = '/api/jobs';
        let method = 'POST';

        const jobIdInput = document.getElementById('job-id');
        if (jobIdInput) {
            url = '/api/jobs/' + jobIdInput.value;
            method = 'PUT';
        }

        const response = await apiFetch(url, {
            method: method,
            body: JSON.stringify(data)
        });

        if (response.ok) {
            window.location.href = '/jobs';
        } else {
            const err = await response.text();
            alert('Ошибка сохранения: ' + err);
        }
    });
</script>
{% endblock %}
