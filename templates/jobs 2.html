{% extends "base.html" %}

{% block content %}
<h1>Мои вакансии</h1>
<button onclick="createJob()" class="btn"><i class="fas fa-plus"></i> Создать вакансию</button>
<table id="jobsTable">
    <thead>
        <tr>
            <th>Название</th>
            <th>Порог баллов</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
async function loadJobs() {
    const response = await apiFetch('/api/jobs');
    const jobs = await response.json();
    const tbody = document.querySelector('#jobsTable tbody');
    tbody.innerHTML = '';
    jobs.forEach(job => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${job.title}</td>
            <td>${job.threshold_score}</td>
            <td>${new Date(job.created_at).toLocaleString()}</td>
             <td>
                <button onclick="viewApplications('${job.id}')" class="btn btn-sm"><i class="fas fa-list"></i> Отклики</button>
                <button onclick="editJob('${job.id}')" class="btn btn-sm"><i class="fas fa-edit"></i> Редактировать</button>
                <button onclick="deleteJob('${job.id}')" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> Удалить</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function createJob() { window.location.href = '/jobs/new'; }
function editJob(id) { window.location.href = `/jobs/${id}/edit`; }
function viewApplications(id) { window.location.href = `/jobs/${id}/applications`; }
async function deleteJob(id) {
    if (!confirm('Удалить вакансию?')) return;
    const response = await apiFetch(`/api/jobs/${id}`, { method: 'DELETE' });
    if (response.ok) loadJobs();
    else alert('Ошибка удаления');
}

loadJobs();
</script>
{% endblock %}
